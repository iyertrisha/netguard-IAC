version: "3.9"

networks:
  netguard_network:
    driver: bridge

volumes:
  postgres_data:

services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: netguard
      POSTGRES_PASSWORD: netguard
      POSTGRES_DB: netguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - netguard_network

  parser:
    build:
      context: .
      dockerfile: docker/Dockerfile.parser
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    networks:
      - netguard_network

  graph_engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.graph_engine
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - netguard_network

  risk_scorer:
    build:
      context: .
      dockerfile: docker/Dockerfile.risk_scorer
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - .env
    networks:
      - netguard_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - parser
      - graph_engine
      - risk_scorer
    networks:
      - netguard_network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - netguard_network
